name: Web
on:
  push:
    branches: master

jobs:
  auto-deploy:
    runs-on: RackDockerLXC
    steps:
      - name: pull
        uses: actions/checkout@v4
      - name: build-docker
        run: docker build -t web .
      - name: deploy
        run: |
          docker stop web-server || true
          docker rm web-server || true
          docker run -d --name web-server -p 5000:5000 web